<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React</title>
</head>
<body>
    <button>Button Click</button>
</body>
<script>
    class react{
        constructor(){
            this.library = "React";
            this.server = "https://reactjs.org/";

            // requirment
            document.querySelector("button")
            .addEventListener("click", this.handleClick.bind(this));
            //bind() method is used to bind the this keyword to the current instance of the class, so that when the handleClick method is called, it has access to the correct context and can access the server property of the class.
        }
        handleClick(){
            console.log("Button Clicked");
            console.log(this.server);
            
        }

    }

    const app = new react();
</script>
</html>
