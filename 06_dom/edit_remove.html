<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit and Remove elements in DOM</title>
</head>
<body style="background-color: #212122; color: antiquewhite;">
    <ul class = "language">
        <li>JavaScript</li>
    </ul>
    
</body>
<script>
    function addlanguage(langName){
        const li = document.createElement('li');
        li.innerHTML = `${langName}`;
        document.querySelector('.language').appendChild(li);
    }
    addlanguage('Python');
    addlanguage('Java');

    function addOptiLanguage (langName){
        const li = document.createElement('li');
        li.appenchild(document.createTextNode(langName));
        document.querySelector('.language').appendChild(li);
    }
    addOptiLanguage('C++');


    //edit
    const secondLang = document.querySelector("li:nth-child(2)")
    // secondLang.innerHTML = "Python Programming Language";
    const newli = document.createElement('li')
    newli.textContent = "Python Programming Language";
    secondLang.replaceWith(newli);

    //edit
    const firstlang = document.querySelector("li:first-child");
    firstlang.outerHTML = "<li>JavaScript Programming Language</li>";


    //remove
    const lastLang = document.querySelector("li:last-child");
    lastLang.remove();
    
</script>
</html>
